# Development environment configuration
data_dir: data/raw/data_wound_seg
output_dir: output/train_results
model_dir: models
metadata_path: data/metadata_enriched.csv

training:
  encoder: resnet34
  encoder_weights: imagenet
  image_size: 384
  batch_size: 6
  accumulation_steps: 2
  epochs: 100
  learning_rate: 1e-4
  patience: 15
  device: cuda

inference:
  batch_size: 8
  threshold: 0.5
  postprocess_min_area: 50

logging:
  level: DEBUG
  log_dir: logs/training
